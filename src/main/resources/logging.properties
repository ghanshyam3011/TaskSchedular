# Global logging properties
handlers=java.util.logging.ConsoleHandler
.level=INFO

# Limit the messages that are printed on the console to INFO and above
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# Set specific levels for different packages - use OFF which is more restrictive than SEVERE
com.joestelmach.natty.Parser.level=OFF
com.joestelmach.natty.level=OFF
com.joestelmach.level=OFF
org.quartz.level=WARNING
net.objectlab.level=OFF
org.antlr.level=OFF

# Filter out all logs from Natty parser
com.joestelmach.natty.Parser.filter=com.taskscheduler.util.NattyLoggingFilter
com.joestelmach.natty.filter=com.taskscheduler.util.NattyLoggingFilter
com.joestelmach.filter=com.taskscheduler.util.NattyLoggingFilter
net.objectlab.filter=com.taskscheduler.util.NattyLoggingFilter
org.antlr.filter=com.taskscheduler.util.NattyLoggingFilter

# Format the log messages - remove the source class name to make the output cleaner
java.util.logging.SimpleFormatter.format=%5$s%n
